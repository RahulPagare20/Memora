{% extends "base.html" %}

{% block title %}Create Account — Memora{% endblock %}

{% block content %}
<section class="auth-page">

    <div class="auth-form-box">

        <span class="hero-badge">🌟 Join Memora</span>

        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Start reconnecting with memories today</p>

        <form class="auth-form" action="/register" method="POST">

            {% if error %}
            <div class="form-error">{{ error }}</div>
            {% endif %}

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="••••••••" required>
            </div>

            <button type="submit" class="primary-btn form-btn">Create Account →</button>

        </form>

        <p class="auth-switch">
            Already have an account? <a href="/login">Login</a>
        </p>

    </div>

</section>
{% endblock %}
