{% extends "base.html" %}

{% block title %}Login — Memora{% endblock %}

{% block content %}
<section class="auth-page">

    <div class="auth-form-box">

        <span class="hero-badge">🔑 Welcome Back</span>

        <h1 class="auth-title">Login to Memora</h1>
        <p class="auth-subtitle">Sign in to continue your journey</p>

        <form class="auth-form" action="/login" method="POST">

            {% if error %}
            <div class="form-error">{{ error }}</div>
            {% endif %}

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="primary-btn form-btn">Login →</button>

        </form>

        <p class="auth-switch">
            Don't have an account? <a href="/register">Create one</a>
        </p>

    </div>

</section>
{% endblock %}
