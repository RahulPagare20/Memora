<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login — Memora</title>

    <link rel="stylesheet" href="../static/style.css">
    <link rel="stylesheet" href="../static/animations.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">

            <h2>MEMORA</h2>

        </div>

        <div class="nav-links">

            <a href="landing.html">Home</a>

            <a href="#features">Features</a>

            <a href="#about">About</a>

            <a href="login.html">Login</a>

            <a href="register.html"
               class="nav-btn">

                Get Started

            </a>

        </div>

    </nav>

    <!-- PAGE CONTENT -->

    <main>

        <section class="auth-page">

            <div class="auth-form-box reveal">

                <span class="hero-badge">🔑 Welcome Back</span>

                <h1 class="auth-title">Login to Memora</h1>
                <p class="auth-subtitle">Sign in to continue your journey</p>

                <form class="auth-form" action="register.html" method="POST">

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-eye-wrap">
                            <input type="password" id="password" name="password" placeholder="••••••••" required>
                            <button type="button" class="eye-btn" onclick="togglePassword()"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg></button>
                        </div>
                    </div>

                    <button type="submit" class="primary-btn form-btn">Login →</button>

                </form>

                <p class="auth-switch">
                    Don't have an account? <a href="register.html">Create one</a>
                </p>

            </div>

        </section>

    </main>

    <!-- FOOTER -->

    <footer class="footer">

        <h3>MEMORA</h3>

        <p>

            Helping Dementia and Alzheimer's patients
            reconnect with memories and loved ones.....

        </p>

        <p>

            © 2026 Memora. All Rights Reserved.

        </p>

    </footer>

    <script src="../static/script.js"></script>
    <script src="../static/animations.js"></script>

</body>

</html>
