<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cullinan</title>
<link rel="icon" type="image/jpg" href="/images/the_cullinan_pfp_white.jpg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<style>
:root{
    --bg:#FFFFFF;
    --fg:#000;
    --border:#000;
    --input-bg:transparent;
}

body.dark{
    --bg:#000;
    --fg:#B8FF00;
    --border:#B8FF00;
    --input-bg:rgba(255,255,255,0.03);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:var(--bg);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:var(--fg);
    transition:all 0.25s ease;
}

.theme-toggle{
    position:fixed;
    top:20px;
    right:20px;
}

.form-check-input{
    cursor:pointer;
    border:2px solid var(--border);
}

.form-check-label{
    color:var(--fg);
    cursor:pointer;
    user-select:none;
}

.login-container{
    width:350px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.logo{
    width:260px;
    margin-bottom:40px;
    transition:filter 0.25s ease;
}

body.dark .logo{
    filter:invert(1);
}

.input-group{
    width:100%;
    margin-bottom:12px;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:14px;
    background:var(--input-bg);
    border:2px solid var(--border);
    outline:none;
    color:var(--fg);
    font-size:15px;
    transition:all 0.25s ease;
}

input::placeholder{
    color:var(--fg);
    opacity:0.7;
}

input:focus{
    background:rgba(0,0,0,0.03);
}

body.dark input:focus{
    background:rgba(255,255,255,0.05);
}

input[type="submit"]{
    width:100%;
    padding:14px;
    border:2px solid var(--border);
    background:transparent;
    color:var(--fg);
    cursor:pointer;
    transition:all 0.2s ease;
}

input[type="submit"]:hover{
    background:var(--fg);
    color:var(--bg);
}

.footer{
    margin-top:20px;
    opacity:0.7;
    letter-spacing:1px;
    text-transform:uppercase;
    text-align:center;
}

.footer p{
    margin-bottom:0;
}

a{
    color:inherit;
}

.signature{
    margin-top:10px;
    font-size:clamp(0.75rem, 1vw, 0.9rem);
    opacity:0.65;
    text-transform:none;
    letter-spacing:0;
}

.password-wrapper{
    position:relative;
    width:100%;
}

.toggle-password{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
    opacity:0.7;
    font-size:14px;
}
</style>
</head>
<body>

<script>
    if (localStorage.getItem("cullinan-theme") === "dark") {
        document.body.classList.add("dark");
    }
</script>

<div class="theme-toggle">
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="themeToggle">
        <label class="form-check-label" for="themeToggle">
            Dark Mode
        </label>
    </div>
</div>

<div class="login-container">

    <img src="/images/the_cullinan_pfp_white.jpg"
         alt="The Cullinan"
         class="logo">

    <form style="width:100%;" action="/inner/server/login" method="post">

        <div class="input-group">
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="Username">
        </div>

        <div class="input-group">
            <div class="password-wrapper">
                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Password">
                <span class="toggle-password" id="togglePassword">Show</span>
            </div>
        </div>

        <input type="submit" value="Login">
    </form>

    <div class="footer">
        {% if error_message %}
            <p class="lead"><b>{{ error_message }}</b></p>
        {% else %}
            <p class="lead">Authentication Mandated.</p>
        {% endif %}

        <div class="signature">
            A team for Steminate Hacks 2026,<br>
            Backend made by <a href="https://github.com/RahulPagare20">Rahul Pagare</a>.
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

<script>
    const toggle = document.getElementById("themeToggle");

    const savedTheme = localStorage.getItem("cullinan-theme");

    if (savedTheme === "dark") {
        document.body.classList.add("dark");
        toggle.checked = true;
    }

    toggle.addEventListener("change", function () {

        if (toggle.checked) {
            document.body.classList.add("dark");
            localStorage.setItem("cullinan-theme", "dark");
        } else {
            document.body.classList.remove("dark");
            localStorage.setItem("cullinan-theme", "light");
        }

    });
</script>

<script>
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("togglePassword");

    togglePassword.addEventListener("click", function () {

        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            togglePassword.textContent = "Hide";
        } else {
            passwordInput.type = "password";
            togglePassword.textContent = "Show";
        }

    });
</script>

</body>
</html>
