<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalize — Memora</title>
    
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='animations.css') }}">

</head>

<body>

    <nav class="navbar">
        <div class="logo"><h2>MEMORA</h2></div>
        <div class="nav-links">
            <a href="landing.html">Home</a>
            <a href="login.html">Login</a>
        </div>
    </nav>

    <main>
        <section class="auth-page">
            <div class="auth-form-box personalize-box reveal">

                <span class="hero-badge">🌿 Almost There</span>
                <h1 class="auth-title">Personalize</h1>
                <p class="auth-subtitle">Help us tailor the experience for your loved one</p>
                {% if error %}
                    <h1>Error: {{ error }}</h1>
                {% endif %}

                <form class="auth-form personalize-form" id="personalize-form" action="/api/create_account_st2" method="POST">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="hidden" name="user_id" id="user_id" value="{{ user_id }}">

                    <div class="form-group full-width">
                        <label for="full_name">Patient's Name</label>
                        <input type="text" name="full_name" id="full_name" placeholder="Full name of the patient" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="phone_number">Patient's Phone Number</label>
                        <input type="tel" name="phone_number" id="phone_number" placeholder="+91 XXXXXXXXXX" required>
                    </div>

                    <div class="form-group full-width">
                        <label>Dementia Stage</label>
                        <div class="stage-toggle">
                            <input type="radio" id="stage1" name="dementia_stage" value="early">
                            <label for="stage1" class="stage-btn">Early Stage</label>

                            <input type="radio" id="stage2"  name="dementia_stage" value="intermediate">
                            <label for="stage2" class="stage-btn">Intermediate Stage</label>

                            <input type="radio" id="stage3" name="dementia_stage" value="severe">
                            <label for="stage3" class="stage-btn">Severe Stage</label>
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="caretaker-phone">
                            Caretaker's Phone Number
                            <span class="optional-tag">Optional</span>
                        </label>
                        <input type="tel" name="caretaker_phone_number" id="caretaker_phone_number" placeholder="+91 XXXXXXXXXX">
                    </div>

                    <button type="submit" class="primary-btn form-btn">Continue →</button>

                </form>

            </div>
        </section>
    </main>

    <footer class="footer">
        <h3>MEMORA</h3>
        <p>Helping Dementia and Alzheimer's patients reconnect with memories and loved ones.....</p>
        <p>© 2026 Memora. All Rights Reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='animations.js') }}"></script>

</body>
</html>
