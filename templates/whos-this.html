<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>    
    <title>Who's This? — Memora</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── VIDEO FEED ── */
        #video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 18px;
            border-radius: 50px;
            font-family: 'Georgia', serif;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            letter-spacing: .3px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.22); }
        .back-btn svg   { flex-shrink: 0; }

        .top-title {
            font-size: .95rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .cam-switch-btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cam-switch-btn:hover { background: rgba(255,255,255,0.22); }

        /* ── BOTTOM LABEL ── */
        .bottom-label {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 28px 24px 36px;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
            text-align: center;
        }
        .bottom-prompt {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: .4px;
        }
        .bottom-sub {
            font-size: .95rem;
            color: rgba(255,255,255,0.55);
            font-style: italic;
        }

        /* ── OVERLAY CANVAS ── */
        #overlay {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* ── ERROR STATE ── */
        .cam-error {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #1a0e06;
            color: #f5efe6;
            text-align: center;
            padding: 40px;
        }
        .cam-error-icon { font-size: 3rem; }
        .cam-error h2   { font-size: 1.3rem; font-weight: 700; color: #f5efe6; }
        .cam-error p    { font-size: .92rem; color: #b89a78; font-style: italic; line-height: 1.6; max-width: 300px; }
        .cam-error a {
            margin-top: 8px;
            display: inline-block;
            background: linear-gradient(90deg, #8b5a2b, #c8956c);
            color: #fff8f0;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: .9rem;
        }
    </style>
</head>
<body>

    <!-- Live camera feed -->
    <video id="video" autoplay playsinline muted></video>
    <!-- Hidden capture canvas (sends frames to server) -->
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
    <!-- Visible overlay canvas (draws bounding boxes) -->
    <canvas id="overlay"></canvas>

    <!-- Top bar -->
    <div class="top-bar">
        <a href="dashboard.html" class="back-btn" id="back-btn" onclick="stopCamera()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back
        </a>
        <span class="top-title">Who's This?</span>
        <button class="cam-switch-btn" onclick="switchCamera()" title="Switch camera">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/></svg>
        </button>
    </div>

    <!-- Bottom prompt -->
    <div class="bottom-label">
        <p class="bottom-sub">Point the camera at a face to identify.</p>
        <p class="bottom-prompt" id="message_ls">Waiting for server to connect ...</p>
    </div>

    <!-- Error state -->
    <div class="cam-error" id="cam-error">
        <div class="cam-error-icon">📷</div>
        <h2>Camera not available</h2>
        <p>Please allow camera access in your browser settings and try again.</p>
        <a href="dashboard.html">← Go Back</a>
    </div>

    <script>
        var stream = null;
        var facingMode = 'user';

        function startCamera() {
            var constraints = {
                video: {
                    facingMode: facingMode,
                    width:  { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(s) {
                    stream = s;
                    document.getElementById('video').srcObject = s;
                })
                .catch(function() {
                    document.getElementById('cam-error').style.display = 'flex';
                });
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(function(t) { t.stop(); });
                stream = null;
            }
        }

        function switchCamera() {
            stopCamera();
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            startCamera();
        }

        /* stop camera when leaving the page */
        window.addEventListener('pagehide', stopCamera);
        window.addEventListener('beforeunload', stopCamera);

        startCamera();


        // ── SocketIO + canvas overlay ─────────────────────────────────────
        const socket  = io();
        const video   = document.getElementById('video');
        const canvas  = document.getElementById('canvas');   // hidden capture
        const ctx     = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');  // visible overlay
        const octx    = overlay.getContext('2d');

        // Keep overlay canvas sized to the viewport
        function resizeOverlay() {
            overlay.width  = window.innerWidth;
            overlay.height = window.innerHeight;
        }
        resizeOverlay();
        window.addEventListener('resize', resizeOverlay);

        // Send frames to server
        setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataURL = canvas.toDataURL('image/jpeg', 0.6);
                socket.emit('image', { frame: dataURL, user_id: "{{ user_id }}" });
            }
        }, 100);

        // ── State ────────────────────────────────────────────────────
        let lastFaces   = [];
        // let globalScanY = 0;

        // ── Full-view purple scan line (always on) ────────────────────
        /*
        function drawGlobalScan(vr) {
            globalScanY += 1.8;
            if (globalScanY > vr.height) globalScanY = 0;

            const absY = vr.top + globalScanY;
            const grad = octx.createLinearGradient(vr.left, absY - 28, vr.left, absY + 28);
            grad.addColorStop(0,   'rgba(160,80,255,0)');
            grad.addColorStop(0.5, 'rgba(160,80,255,0.22)');
            grad.addColorStop(1,   'rgba(160,80,255,0)');
            octx.fillStyle = grad;
            octx.fillRect(vr.left, absY - 28, vr.width, 56);

            octx.strokeStyle = 'rgba(190,120,255,0.75)';
            octx.lineWidth   = 1.5;
            octx.shadowColor = 'rgba(190,120,255,1)';
            octx.shadowBlur  = 12;
            octx.beginPath();
            octx.moveTo(vr.left, absY);
            octx.lineTo(vr.left + vr.width, absY);
            octx.stroke();
            octx.shadowBlur = 0;
        }
        */

        // ── Cyberpunk card — top-right, no face box ───────────────────
        function drawCyberCard(c, face, faceCX, faceCY, known, idx) {
            const name     = face.name     || 'Unknown';
            const relation = face.relation || '';

            const MARGIN = 24;
            const cardW  = 260;
            const cardH  = known && relation ? 90 : 62;
            const cardX  = overlay.width - cardW - MARGIN;
            const cardY  = 80 + idx * (cardH + 18);

            const neon    = known ? '#bf7fff' : '#ff4da6';
            const neonDim = known ? 'rgba(191,127,255,0.4)' : 'rgba(255,77,166,0.4)';
            const bg      = known ? 'rgba(18,5,35,0.92)'    : 'rgba(35,5,20,0.92)';

            // card shape — bottom-left corner cut
            const cut = 18;
            c.beginPath();
            c.moveTo(cardX,             cardY);
            c.lineTo(cardX + cardW,     cardY);
            c.lineTo(cardX + cardW,     cardY + cardH);
            c.lineTo(cardX + cut,       cardY + cardH);
            c.lineTo(cardX,             cardY + cardH - cut);
            c.closePath();

            c.fillStyle   = bg;
            c.shadowColor = neon;
            c.shadowBlur  = 24;
            c.fill();

            c.strokeStyle = neon;
            c.lineWidth   = 2;
            c.shadowBlur  = 14;
            c.stroke();
            c.shadowBlur  = 0;

            // left accent bar
            c.fillStyle   = neon;
            c.shadowColor = neon;
            c.shadowBlur  = 10;
            c.fillRect(cardX, cardY + 10, 4, cardH - 20);
            c.shadowBlur  = 0;

            // text
            c.textBaseline = 'middle';
            c.textAlign    = 'left';

            if (known && relation) {
                c.font        = 'bold 17px "Courier New", monospace';
                c.fillStyle   = '#ffffff';
                c.shadowColor = 'rgba(255,255,255,0.4)';
                c.shadowBlur  = 6;
                c.fillText(name, cardX + 18, cardY + 28);
                c.shadowBlur  = 0;

                c.strokeStyle = neonDim;
                c.lineWidth   = 1;
                c.beginPath();
                c.moveTo(cardX + 18,         cardY + 48);
                c.lineTo(cardX + cardW - 14, cardY + 48);
                c.stroke();

                c.font        = '14px "Courier New", monospace';
                c.fillStyle   = neon;
                c.shadowColor = neon;
                c.shadowBlur  = 8;
                c.fillText('REL: ' + relation.toUpperCase(), cardX + 18, cardY + 68);
                c.shadowBlur  = 0;
            } else {
                c.font        = 'bold 17px "Courier New", monospace';
                c.fillStyle   = known ? '#ffffff' : neon;
                c.shadowColor = known ? 'rgba(255,255,255,0.3)' : neon;
                c.shadowBlur  = 6;
                c.fillText(name, cardX + 18, cardY + cardH / 2);
                c.shadowBlur  = 0;
            }
            c.textAlign = 'left';
        }

        // ── Main render loop ──────────────────────────────────────────
        function renderFrame() {
            octx.clearRect(0, 0, overlay.width, overlay.height);

            const vr = video.getBoundingClientRect();
            // drawGlobalScan(vr);

            if (lastFaces.length > 0) {
                const scaleX = vr.width  / 640;
                const scaleY = vr.height / 480;

                lastFaces.forEach(function(face, idx) {
                    const x  = vr.left + face.left * scaleX;
                    const y  = vr.top  + face.top  * scaleY;
                    const w  = (face.right  - face.left) * scaleX;
                    const h  = (face.bottom - face.top)  * scaleY;
                    const cx = x + w / 2;
                    const cy = y + h / 2;
                    drawCyberCard(octx, face, cx, cy, face.id !== null, idx);
                });
            }

            requestAnimationFrame(renderFrame);
        }

        requestAnimationFrame(renderFrame);

        socket.on('face_detected', function(data) {
            if (data.status == 'detected') {
                lastFaces = (data.status === 'none' || !data.faces) ? [] : data.faces;
                document.getElementById('message_ls').innerHTML = "Success! Face detected and identified!"
            }

            else if (data.status == "none") {
                document.getElementById('message_ls').innerHTML = "No family member recognised."
            }
            else if (data.status == 'error') {
                document.getElementById('message_ls').innerHTML = "Error from flask-socketio."
            }
            else {
                document.getElementById('message_ls').innerHTML = "No face detected."
            }
        });
    </script>
</body>
</html>
