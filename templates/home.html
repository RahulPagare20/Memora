<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cullinan</title>

<link rel="icon" type="image/jpg" href="/images/the_cullinan_pfp_white.jpg">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        color:#000;
        min-height:100vh;
        transition:all 0.25s ease;
    }

    .container{
        max-width:900px;
        margin:auto;
        padding:40px 24px;
    }

    .logo{
        width:220px;
        display:block;
        margin-bottom:40px;
        transition:filter 0.25s ease;
    }

    .welcome{
        margin-bottom:40px;
    }

    .welcome h1{
        font-size:2rem;
        font-weight:700;
        margin-bottom:8px;
    }

    .welcome p{
        opacity:0.75;
    }

    .routes{
        display:flex;
        flex-direction:column;
        gap:12px;
    }

    .route{
        display:block;
        padding:16px;
        border:2px solid black;
        text-decoration:none;
        color:black;
        transition:0.15s;
    }

    .route:hover{
        background:black;
        color:#B8FF00;
    }

    .footer{
        margin-top:50px;
        opacity:0.7;
        font-size:0.85rem;
    }

    /* Theme Toggle */
    .theme-toggle{
        position:fixed;
        top:20px;
        right:20px;
        z-index:1000;
    }

    .form-check-label{
        cursor:pointer;
        user-select:none;
    }

    a { color: inherit; }

    body.dark{
        background:#000;
        color:#B8FF00;
    }

    body.dark .route{
        border-color:#B8FF00;
        color:#B8FF00;
    }

    body.dark .route:hover{
        background:#B8FF00;
        color:#000;
    }

    body.dark .welcome p,
    body.dark .footer,
    body.dark a{
        color:#B8FF00;
    }

    body.dark .logo{
        filter:invert(1);
    }
</style>
</head>
<body>

<div class="theme-toggle">
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="themeToggle">
        <label class="form-check-label" for="themeToggle">
            Dark Mode
        </label>
    </div>
</div>

<div class="container">

    <img src="/images/the_cullinan_pfp_white.jpg" alt="The Cullinan" class="logo">

    <div class="welcome">
        <h1>Welcome, {{ username }}!</h1>
        <p>Following routes are operational:</p>
    </div>

    <div class="routes">

        <a href="/team" class="route">
            /team (get)
        </a>

        <a href="/admin" class="route">
            /admin (get)
        </a>        

        <a href="/api/create_account_st1" class="route">
            /api/create_account_st1 (post)
        </a>

        <a href="/api/create_account_st2" class="route">
            /api/create_account_st2 (post)
        </a>

        <a href="/api/check_authentication" class="route">
            /api/check_authentication (post)
        </a>

        <a href="/api/login" class="route">
            /api/login (post)
        </a>        

        <a href="/api/add_profile_image" class="route">
            /api/add_profile_image (post)
        </a>        
    </div>

    <div class="footer">
        <p style="font-size:clamp(1.00rem, 1vw, 0.9rem); opacity:1;">
            A team for Steminate Hacks 2026,<br>
            Backend made by <a href="https://github.com/RahulPagare20">Rahul Pagare</a>.
        </p>
    </div>

</div>

<script>
    const toggle = document.getElementById("themeToggle");

    // Restore saved preference
    if (localStorage.getItem("cullinan-theme") === "dark") {
        document.body.classList.add("dark");
        toggle.checked = true;
    }

    toggle.addEventListener("change", function () {
        document.body.classList.toggle("dark");

        localStorage.setItem(
            "cullinan-theme",
            document.body.classList.contains("dark") ? "dark" : "light"
        );
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
