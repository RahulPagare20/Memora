<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>    
    <title>Who's This? — Memora</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            font-family: 'Georgia', serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── VIDEO FEED ── */
        #video {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* ── TOP BAR ── */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 18px;
            border-radius: 50px;
            font-family: 'Georgia', serif;
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
            letter-spacing: .3px;
        }
        .back-btn:hover { background: rgba(255,255,255,0.22); }
        .back-btn svg   { flex-shrink: 0; }

        .top-title {
            font-size: .95rem;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .cam-switch-btn {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .cam-switch-btn:hover { background: rgba(255,255,255,0.22); }

        /* ── BOTTOM LABEL ── */
        .bottom-label {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 28px 24px 36px;
            background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
            text-align: center;
        }
        .bottom-prompt {
            font-size: 1.15rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: .4px;
        }
        .bottom-sub {
            font-size: .82rem;
            color: rgba(255,255,255,0.55);
            font-style: italic;
        }

        /* ── ERROR STATE ── */
        .cam-error {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #1a0e06;
            color: #f5efe6;
            text-align: center;
            padding: 40px;
        }
        .cam-error-icon { font-size: 3rem; }
        .cam-error h2   { font-size: 1.3rem; font-weight: 700; color: #f5efe6; }
        .cam-error p    { font-size: .92rem; color: #b89a78; font-style: italic; line-height: 1.6; max-width: 300px; }
        .cam-error a {
            margin-top: 8px;
            display: inline-block;
            background: linear-gradient(90deg, #8b5a2b, #c8956c);
            color: #fff8f0;
            padding: 12px 28px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: .9rem;
        }
    </style>
</head>
<body>

    <!-- Live camera feed -->
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <img id="processed_image" width="640" height="480" alt="Waiting for video stream..." />

    <!-- Top bar -->
    <div class="top-bar">
        <a href="dashboard.html" class="back-btn" id="back-btn" onclick="stopCamera()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Back
        </a>
        <span class="top-title">Who's This?</span>
        <button class="cam-switch-btn" onclick="switchCamera()" title="Switch camera">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01"/><path d="M15 9h.01"/></svg>
        </button>
    </div>

    <!-- Bottom prompt -->
    <div class="bottom-label">
        <p class="bottom-prompt">Point the camera at a face</p>
        <h1 id="name_tag">Initial tag</h1>
    </div>

    <!-- Error state -->
    <div class="cam-error" id="cam-error">
        <div class="cam-error-icon">📷</div>
        <h2>Camera not available</h2>
        <p>Please allow camera access in your browser settings and try again.</p>
        <a href="dashboard.html">← Go Back</a>
    </div>

    <script>
        var stream = null;
        var facingMode = 'user';

        function startCamera() {
            var constraints = {
                video: {
                    facingMode: facingMode,
                    width:  { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(s) {
                    stream = s;
                    document.getElementById('video').srcObject = s;
                })
                .catch(function() {
                    document.getElementById('cam-error').style.display = 'flex';
                });
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(function(t) { t.stop(); });
                stream = null;
            }
        }

        function switchCamera() {
            stopCamera();
            facingMode = facingMode === 'user' ? 'environment' : 'user';
            startCamera();
        }

        /* stop camera when leaving the page */
        window.addEventListener('pagehide', stopCamera);
        window.addEventListener('beforeunload', stopCamera);

        startCamera();


        // SocketIO
        const socket = io();
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => console.error("Camera access denied: ", err));

        setInterval(() => {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataURL = canvas.toDataURL('image/jpeg', 0.6);  // this is your base64 frame
                socket.emit('image', { frame: dataURL, user_id: "{{ user_id }}" });
            }
        }, 10);

        // Receive processed frames
        socket.on('face_detected', function(data) {
            //processedImage.src = data;
            // console.log("Data received from app.py: ", data);
            // var c = document.getElementById("canvas");
            // var ctx = c.getContext("2d");
            // ctx.font = "30px Arial";
            //console.log(data)

            var stat = document.getElementById('name_tag');
            console.log(data['status'])
            
            if (data['status'] == 'error') {
                stat.innerHTML = "No face was detected."
            }            
            if (data['status'] == 'none') {
                stat.innerHTML = 'No family member detected.';
            }
            if (data['status'] == 'detected') {
                stat.innerHTML = data['faces'][0]['name'];
            }
        });       


    </script>
</body>
</html>
