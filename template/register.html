<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Create Account — Memora</title>

    <link rel="stylesheet" href="../static/style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="logo">

            <h2>MEMORA</h2>

        </div>

        <div class="nav-links">

            <a href="/">Home</a>

            <a href="#features">Features</a>

            <a href="#about">About</a>

            <a href="/login">Login</a>

            <a href="/register"
               class="nav-btn">

                Get Started

            </a>

        </div>

    </nav>

    <!-- PAGE CONTENT -->

    <main>

        <section class="auth-page">

            <div class="auth-form-box">

                <span class="hero-badge">🌟 Join Memora</span>

                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start reconnecting with memories today</p>

                <form class="auth-form" action="/register" method="POST">

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm">Confirm Password</label>
                        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="primary-btn form-btn">Create Account →</button>

                </form>

                <p class="auth-switch">
                    Already have an account? <a href="/login">Login</a>
                </p>

            </div>

        </section>

    </main>

    <!-- FOOTER -->

    <footer class="footer">

        <h3>MEMORA</h3>

        <p>

            Helping Dementia and Alzheimer's patients
            reconnect with memories and loved ones.....

        </p>

        <p>

            © 2026 Memora. All Rights Reserved.

        </p>

    </footer>

    <script src="../static/script.js"></script>

</body>

</html>
